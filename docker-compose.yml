# Standalone MCP Legal IT
# For full server setup with SAPG, use ~/server-infra/docker-compose.yml

services:
  mcp-legal-it:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LEGAL_PROFILE=full
      - MCP_TRANSPORT=sse
    volumes:
      - mcp-cache:/app/.cache/mcp-legal-it
    restart: unless-stopped

volumes:
  mcp-cache:
