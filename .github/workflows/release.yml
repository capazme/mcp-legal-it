name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TAG_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Desktop Extension (.mcpb)
        run: |
          VERSION="${TAG_VERSION#v}"
          chmod +x scripts/build-dxt.sh
          scripts/build-dxt.sh "$VERSION"

      - name: Build Claude Code Plugin (.zip)
        run: |
          VERSION="${TAG_VERSION#v}"
          chmod +x scripts/build-plugin.sh
          scripts/build-plugin.sh "$VERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.mcpb
            dist/*.zip
